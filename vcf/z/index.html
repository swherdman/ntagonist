<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ntagonist — Contact Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #8892a4; font-size: 0.9rem; line-height: 1.5; }
    .error { color: #ef5350; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2a4a;
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #4fc3f7; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <p id="message">Loading contact...</p>
  </div>
  <script>
    (async function () {
      var spinner = document.getElementById('spinner');
      var message = document.getElementById('message');

      function showResult(html) {
        spinner.style.display = 'none';
        message.innerHTML = html;
      }

      var hash = window.location.hash.substring(1);
      if (!hash) {
        showResult(
          '<h1>ntagonist</h1>' +
          '<p>This page receives compressed contact data from NFC tags.<br>' +
          'Visit <a href="https://swherdman.github.io/ntagonist/">ntagonist</a> to create one.</p>'
        );
        return;
      }

      try {
        // base64url → standard base64
        var b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';
        var bytes = Uint8Array.from(atob(b64), function (c) { return c.charCodeAt(0); });

        // Decompress with native deflate-raw
        var stream = new Blob([bytes]).stream()
          .pipeThrough(new DecompressionStream('deflate-raw'));
        var vcard = await new Response(stream).text();

        // Extract FN for filename
        var fnMatch = vcard.match(/^FN:(.+)$/m);
        var name = fnMatch ? fnMatch[1].trim().replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '_') : 'contact';

        var blob = new Blob([vcard], { type: 'text/vcard' });
        var url = URL.createObjectURL(blob);

        var a = document.createElement('a');
        a.href = url;
        a.download = name + '.vcf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        showResult(
          '<h1>Contact Ready</h1>' +
          '<p>Your contact card should be downloading.<br>' +
          'If nothing happened, <a href="' + url + '" download="' + name + '.vcf">tap here to download</a>.</p>'
        );

        // Redirect away after download triggers
        setTimeout(function () {
          URL.revokeObjectURL(url);
          window.location.replace('about:blank');
        }, 1500);
      } catch (e) {
        showResult(
          '<h1>Error</h1>' +
          '<p class="error">Could not decode the contact data.<br>' +
          'The NFC tag may contain invalid data or your browser may not support decompression.</p>'
        );
      }
    })();
  </script>
</body>
</html>
