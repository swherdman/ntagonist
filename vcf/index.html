<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ntagonist — Contact Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #8892a4; font-size: 0.9rem; line-height: 1.5; }
    .error { color: #ef5350; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2a4a;
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #4fc3f7; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <p id="message">Loading contact...</p>
  </div>
  <script>
    (function () {
      const card = document.getElementById('card');
      const spinner = document.getElementById('spinner');
      const message = document.getElementById('message');

      function showResult(html) {
        spinner.style.display = 'none';
        message.innerHTML = html;
      }

      const hash = window.location.hash.substring(1);
      if (!hash) {
        showResult(
          '<h1>ntagonist</h1>' +
          '<p>This page receives contact data from NFC tags.<br>' +
          'Visit <a href="https://swherdman.github.io/ntagonist/">ntagonist</a> to create one.</p>'
        );
        return;
      }

      try {
        const vcard = atob(hash);

        // Extract FN for filename
        const fnMatch = vcard.match(/^FN:(.+)$/m);
        const name = fnMatch ? fnMatch[1].trim().replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '_') : 'contact';

        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = name + '.vcf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(() => URL.revokeObjectURL(url), 5000);

        showResult(
          '<h1>Contact Ready</h1>' +
          '<p>Your contact card should be downloading.<br>' +
          'If nothing happened, <a href="' + url + '" download="' + name + '.vcf">tap here to download</a>.</p>'
        );
      } catch (e) {
        showResult(
          '<h1>Error</h1>' +
          '<p class="error">Could not decode the contact data.<br>' +
          'The NFC tag may contain invalid data.</p>'
        );
      }
    })();
  </script>
</body>
</html>
